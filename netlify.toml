# Astor Electronics — Netlify deployment
# Build with: npm run build:netlify

[build]
  command = "npm run build:netlify"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=dev"

# Client-side routing + SSR are handled by @netlify/vite-plugin-tanstack-start.
# Ensure VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY are set in Netlify UI.
